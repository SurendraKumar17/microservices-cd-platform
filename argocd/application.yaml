apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bookmytrip-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/SurendraKumar17/microservices-cd-platform
    targetRevision: main
    path: helm/booking-app
    helm:
      valueFiles:
        - values.yaml
        - /gitops/environments/dev/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: app-dev
  # Tell ArgoCD to treat Ingress as always healthy so the sync wave
  # doesn't block waiting for ALB provisioning. The ALB needs pods
  # behind it to become healthy, but pods can't start until ArgoCD
  # deploys the Rollouts — classic chicken-and-egg. This breaks the
  # loop. ALB will become healthy naturally once pods are running.
  resourceHealthCustomization:
    - group: networking.k8s.io
      kind: Ingress
      health.lua: |
        hs = {}
        hs.status = "Healthy"
        hs.message = "Ingress health skipped - ALB provisioning is async"
        return hs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true