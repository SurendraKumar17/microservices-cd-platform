apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Release.Name }}-book
  labels:
    {{- include "booking.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.book.replicas }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: book
  template:
    metadata:
      labels:
        app: book
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: {{ .Release.Name }}-book
      initContainers:
      - name: otel-agent-init
        image: ghcr.io/open-telemetry/opentelemetry-java-instrumentation/opentelemetry-javaagent:v2.4.0
        imagePullPolicy: IfNotPresent
        command: ["cp", "/javaagent.jar", "/otel/opentelemetry-javaagent.jar"]
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        volumeMounts:
          - name: otel-agent
            mountPath: /otel
      containers:
      - name: book
        image: {{ .Values.global.registry }}/booking-service:{{ .Values.book.tag }}
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: SERVER_PORT
          value: "8080"
        - name: SERVICE_NAME
          value: "book"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: host
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: port
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: dbname
        - name: JAVA_TOOL_OPTIONS
          value: "-javaagent:/otel/opentelemetry-javaagent.jar -Xss512k -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
        - name: OTEL_SERVICE_NAME
          value: "book"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=book,deployment.environment=$(SPRING_PROFILES_ACTIVE),k8s.cluster.name=booking-prod,k8s.namespace.name=$(POD_NAMESPACE),k8s.pod.name=$(POD_NAME)"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.observability.svc.cluster.local:4317"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "grpc"
        - name: OTEL_METRICS_EXPORTER
          value: "none"
        - name: OTEL_LOGS_EXPORTER
          value: "otlp"
        - name: OTEL_TRACES_EXPORTER
          value: "otlp"
        - name: OTEL_INSTRUMENTATION_JDBC_ENABLED
          value: "true"
        - name: OTEL_PROPAGATORS
          value: "tracecontext,baggage,b3multi"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          failureThreshold: 3
          timeoutSeconds: 3
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          failureThreshold: 30
          periodSeconds: 10
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: otel-agent
          mountPath: /otel
      volumes:
      - name: tmp
        emptyDir: {}
      - name: otel-agent
        emptyDir: {}
      securityContext:
        fsGroup: 1000
  strategy:
    canary:
      analysis:
        templates:
        - templateName: {{ .Release.Name }}-success-rate
        startingStep: 2
        args:
        - name: namespace
          value: {{ .Release.Namespace }}
      steps:
      - setWeight: 10
      - pause: {duration: 2m}
      - setWeight: 50
      - pause: {duration: 2m}
      - setWeight: 100